<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read.like.audio: Smart Screen Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A simple, minimalist screen reader with built-in text formatting and voice synthesis.">
</head>
<body>
    <div class="container">
        <header class="sticky-header">
            <div class="header-left">
                <div class="header-title">
                    <h1><a href="https://github.com/LikeDotAudio/Read.Like.audio" target="_blank" rel="noopener noreferrer">Read.like.audio</a></h1>
                </div>
                <div class="button-row">
                    <button id="btn-play" class="btn primary">Play</button>
                    <button id="btn-pause" class="btn secondary">Pause</button>
                    <button id="btn-format" class="btn secondary">Format Text</button>
                    <button id="btn-stop" class="btn danger">Stop</button>
                </div>
            </div>
            <div class="controls-section">
                <div class="row">
                    <button id="btn-notes" class="btn secondary">Notes</button>
                    <div class="control-group">
                        <select id="voice-select">
                            <option>Loading voices...</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="rate-slider">Speed (<span id="rate-value">1.3</span>x)</label>
                        <input type="range" id="rate-slider" min="0.5" max="2" value="1.3" step="0.1">
                    </div>
                    <div class="control-group">
                        <label for="size-select">Text Size</label>
                        <select id="size-select">
                            <option value="1.5rem">Small</option>
                            <option value="2rem" selected>Medium</option>
                            <option value="2.5rem">Large</option>
                            <option value="3.5rem">Extra Large</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div id="toc-sidebar" style="display: none;">
                <h3>Chapters</h3>
                <ul id="toc-list"></ul>
            </div>
            <div class="reader-area">
                <textarea id="text-input" placeholder="Enter or paste text here..."></textarea>
                <div id="prompter-view" style="display: none;"></div>
            </div>
        </main>

        <!-- Notes Modal -->
        <div id="notes-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 style="color: var(--text-primary);">Favorited Notes</h2>
                    <button id="btn-close-notes" class="btn secondary">Close</button>
                </div>
                <textarea id="notes-output" readonly></textarea>
                <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                    <button id="btn-clear-notes" class="btn danger">Clear Notes</button>
                    <button id="btn-copy-notes" class="btn primary">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
